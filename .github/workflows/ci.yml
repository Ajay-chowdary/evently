name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Build-time env: schema + types only — no real services hit.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      DIRECT_URL: postgresql://ci:ci@localhost:5432/ci
      NEXT_PUBLIC_SUPABASE_URL: https://ci.supabase.invalid
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder
      NEXT_PUBLIC_USE_MOCK_CATALOG: "true"
      # Sentry wrapper sees these env vars but skips upload when authToken is empty.
      SENTRY_AUTH_TOKEN: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
